<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Tanu Sharma ❤️</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    }

    .card{
        background:white;
        padding:30px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        width:350px;
    }

    h1{
        color:#ff3366;
        margin-bottom:15px;
    }

    p{
        font-size:20px;
        margin-bottom:25px;
    }

    button{
        padding:12px 30px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        margin:10px;
        transition:.3s;
    }

    .yes{
        background:#28a745;
        color:white;
    }

    .yes:hover{
        background:#218838;
    }

    .no{
        background:#dc3545;
        color:white;
    }

    .no:hover{
        background:#c82333;
    }
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Tanu Sharma ❤️</h1>

    <p>Will you be my friend?</p>

    <button class="yes" onclick="yesClick()">Yes</button>
    <button class="no" onclick="noClick()">No</button>
</div>

<script>
function yesClick(){
    alert("Yay! ❤️ Thank you, Tanu Sharma!");
}

function noClick(){
    alert("Yes ❤️");
}
</script>

</body>
</html>
