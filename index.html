<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favourite Person ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
    width:350px;
}

h2{
    color:#ff4d6d;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ff4d6d;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#ff4d6d;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e63956;
}
</style>

</head>
<body>

<div class="container">
    <h2>❤️ Enter Your Name ❤️</h2>

    <input type="text" id="name" placeholder="Enter your name">

    <button onclick="checkName()">Submit</button>
</div>

<script>
function checkName(){

    let name = document.getElementById("name").value.trim().toLowerCase();

    if(name === "tanu sharma"){
        alert("🥺 You are my favourite person ❤️");
    }
    else{
        alert("😏 Stay Away!");
    }

}
</script>

</body>
</html>
