<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Tanu Sharma ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    /* Background Image */
    background:
    linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
    url("background.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.card{
    width:360px;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

h1{
    color:#ff3366;
    margin-bottom:15px;
}

p{
    font-size:20px;
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ff3366;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff3366;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e6004c;
    transform:scale(1.03);
}

</style>

</head>

<body>

<div class="card">

<h1>❤️ For Tanu Sharma ❤️</h1>

<p>Enter Your Name</p>

<input
type="text"
id="name"
placeholder="Type your name here">

<button onclick="checkName()">
Check
</button>

</div>

<script>

function checkName(){

let name=document.getElementById("name").value.trim().toLowerCase();

if(name==="tanu sharma"){

alert("🥺 You are my favourite person ❤️");

}
else{

alert("😏 Stay Away!");

}

}

</script>

</body>
</html>
